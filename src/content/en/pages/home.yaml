sections:
  - kicker: "MVP Direction"
    title: "Local content first"
    intro: "Every public page is authored as YAML and rendered into static HTML."
    body:
      - "The site keeps routes, metadata, navigation, and structured data connected to the same validated content source."
      - "Future integrations can replace the loader behind server-side abstractions without rewriting the public route structure."
    items:
      - title: "Static export"
        text: "Generated pages can be hosted from the out directory without a Node.js server."
      - title: "Localized paths"
        text: "Locale-prefixed routes keep the URL model ready for translated RedSun content."
