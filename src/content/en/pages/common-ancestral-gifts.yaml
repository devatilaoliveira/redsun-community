sections:
  - kicker: "Ancestral Callings"
    title: "Common affinities"
    body:
      - "Ancestral Callings are tools that allow their bearers to alter the weave of reality with precision. Each Calling represents a deep understanding of one aspect of existence and an inherited affinity with particular patterns of creation."
      - "Common Ancestral Callings manifest more frequently among Half-Zeraphirs. The greater the affinity between the Calling and the intended effect, the less the weave of reality is disturbed."
    items:
      - title: "Speed"
        text: "Grants extra actions each turn for attacking or defending without penalties."
        href: "/magic/common-ancestral-callings/speed/"
      - title: "Fortitude"
        text: "Reinforces tests to resist damage, disease, poison, and similar effects."
        href: "/magic/common-ancestral-callings/fortitude/"
      - title: "Potence"
        text: "Increases Strength and grants additional automatic successes on close-combat damage."
        href: "/magic/common-ancestral-callings/potence/"
      - title: "Resilience"
        text: "Allows increasingly powerful absorption, recovery, and regeneration of wounds."
        href: "/magic/common-ancestral-callings/resilience/"
