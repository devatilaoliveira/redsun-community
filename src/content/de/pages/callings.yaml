      - title: "Potenz"
        text: "Erhöht die Stärke und gewährt zusätzliche automatische Erfolge beim Nahkampfschaden."
        href: "/gaben/potenz/"
      - title: "Schnelligkeit"
        text: "Gewährt zusätzliche Aktionen pro Runde, die ohne Abzüge zum Angreifen oder Verteidigen eingesetzt werden können."
        href: "/gaben/schnelligkeit/"
      - title: "Standhaftigkeit"
        text: "Verstärkt Proben gegen Schaden, Krankheiten, Gifte und ähnliche Einwirkungen."
        href: "/gaben/standhaftigkeit/"
      - title: "Resilienz"
        text: "Ermöglicht immer stärkere Absorption, Erholung und Regeneration von Verletzungen."
        href: "/gaben/resilienz/"
