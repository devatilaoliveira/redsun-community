    title: "Initiative"
    body:
      - "Zu Beginn des Zuges legt jede Figur eine Probe auf Geschicklichkeit + Wachsamkeit oder Intellekt + Wachsamkeit ab und verwendet die Kombination, die zur schnelleren Handlung führt. Das Ergebnis bestimmt die Angriffsreihenfolge."
  - kicker: "Aktionsökonomie"
    title: "Angriff und Verteidigung"
    body:
      - "Jede Figur hat während ihres Zuges Anspruch auf ein Angriffsmanöver und ein Verteidigungsmanöver."
      - "Jedes weitere Verteidigungsmanöver nach dem ersten erleidet einen kumulativen Abzug von −2 Würfeln, bis zu einem Minimum von 0 Würfeln."
    items:
      - title: "Kampftalente"
